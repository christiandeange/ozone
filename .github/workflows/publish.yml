name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-jvm:
    runs-on: ubuntu-latest
    if: github.repository == 'christiandeange/ozone'
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v3
      - uses: gradle/actions/wrapper-validation@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          check-latest: true

      - name: Stage JVM artifacts
        env:
          SONATYPE_CENTRAL_USERNAME: ${{ secrets.SONATYPE_CENTRAL_USERNAME }}
          SONATYPE_CENTRAL_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PASSWORD }}
          ARTIFACT_SIGNING_PRIVATE_KEY: ${{ secrets.ARTIFACT_SIGNING_PRIVATE_KEY }}
          ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ORG_GRADLE_PROJECT_mavenCentralUsername="$SONATYPE_CENTRAL_USERNAME" \
          ORG_GRADLE_PROJECT_mavenCentralPassword="$SONATYPE_CENTRAL_PASSWORD" \
          ORG_GRADLE_PROJECT_signingInMemoryKey="$ARTIFACT_SIGNING_PRIVATE_KEY" \
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword="$ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD" \
          ./gradlew clean publishJvmPublicationToStagingRepository :generator:publishAllPublicationsToStagingRepository --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: staging-jvm
          path: build/staging-deploy
          if-no-files-found: error

  publish-js:
    runs-on: ubuntu-latest
    if: github.repository == 'christiandeange/ozone'
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v3
      - uses: gradle/actions/wrapper-validation@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          check-latest: true

      - name: Stage JS artifacts
        env:
          SONATYPE_CENTRAL_USERNAME: ${{ secrets.SONATYPE_CENTRAL_USERNAME }}
          SONATYPE_CENTRAL_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PASSWORD }}
          ARTIFACT_SIGNING_PRIVATE_KEY: ${{ secrets.ARTIFACT_SIGNING_PRIVATE_KEY }}
          ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ORG_GRADLE_PROJECT_mavenCentralUsername="$SONATYPE_CENTRAL_USERNAME" \
          ORG_GRADLE_PROJECT_mavenCentralPassword="$SONATYPE_CENTRAL_PASSWORD" \
          ORG_GRADLE_PROJECT_signingInMemoryKey="$ARTIFACT_SIGNING_PRIVATE_KEY" \
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword="$ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD" \
          ./gradlew clean publishJsPublicationToStagingRepository --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: staging-js
          path: build/staging-deploy
          if-no-files-found: error

  publish-kotlin:
    runs-on: ubuntu-latest
    if: github.repository == 'christiandeange/ozone'
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v3
      - uses: gradle/actions/wrapper-validation@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          check-latest: true

      - name: Stage Kotlin multiplatform metadata artifacts
        env:
          SONATYPE_CENTRAL_USERNAME: ${{ secrets.SONATYPE_CENTRAL_USERNAME }}
          SONATYPE_CENTRAL_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PASSWORD }}
          ARTIFACT_SIGNING_PRIVATE_KEY: ${{ secrets.ARTIFACT_SIGNING_PRIVATE_KEY }}
          ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ORG_GRADLE_PROJECT_mavenCentralUsername="$SONATYPE_CENTRAL_USERNAME" \
          ORG_GRADLE_PROJECT_mavenCentralPassword="$SONATYPE_CENTRAL_PASSWORD" \
          ORG_GRADLE_PROJECT_signingInMemoryKey="$ARTIFACT_SIGNING_PRIVATE_KEY" \
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword="$ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD" \
          ./gradlew clean publishKotlinMultiplatformPublicationToStagingRepository --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: staging-kotlin
          path: build/staging-deploy
          if-no-files-found: error

  publish-ios:
    runs-on: macos-latest
    if: github.repository == 'christiandeange/ozone'
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v3
      - uses: gradle/actions/wrapper-validation@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          check-latest: true

      - name: Stage iOS artifacts
        env:
          SONATYPE_CENTRAL_USERNAME: ${{ secrets.SONATYPE_CENTRAL_USERNAME }}
          SONATYPE_CENTRAL_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PASSWORD }}
          ARTIFACT_SIGNING_PRIVATE_KEY: ${{ secrets.ARTIFACT_SIGNING_PRIVATE_KEY }}
          ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ORG_GRADLE_PROJECT_mavenCentralUsername="$SONATYPE_CENTRAL_USERNAME" \
          ORG_GRADLE_PROJECT_mavenCentralPassword="$SONATYPE_CENTRAL_PASSWORD" \
          ORG_GRADLE_PROJECT_signingInMemoryKey="$ARTIFACT_SIGNING_PRIVATE_KEY" \
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword="$ARTIFACT_SIGNING_PRIVATE_KEY_PASSWORD" \
          ./gradlew clean \
            publishIosArm64PublicationToStagingRepository \
            publishIosX64PublicationToStagingRepository \
            publishIosSimulatorArm64PublicationToStagingRepository \
            publishKMMBridgeFrameworkPublicationToStagingRepository \
            --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: staging-ios
          path: build/staging-deploy
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    if: github.repository == 'christiandeange/ozone'
    timeout-minutes: 30
    needs:
      - publish-jvm
      - publish-js
      - publish-kotlin
      - publish-ios

    steps:
      # Merge every platform's staging repo into a single Maven repository layout.
      - uses: actions/download-artifact@v4
        with:
          path: staging-all
          pattern: staging-*
          merge-multiple: true

      - name: Upload single deployment to Maven Central Portal
        env:
          SONATYPE_CENTRAL_USERNAME: ${{ secrets.SONATYPE_CENTRAL_USERNAME }}
          SONATYPE_CENTRAL_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PASSWORD }}
        run: |
          (cd staging-all && zip -r ../bundle.zip .)
          TOKEN=$(printf '%s:%s' "$SONATYPE_CENTRAL_USERNAME" "$SONATYPE_CENTRAL_PASSWORD" | base64)
          echo "::add-mask::$TOKEN"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $TOKEN" \
            -F bundle=@bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"

  deploy-release-docs:
    uses: ./.github/workflows/deploy_docs.yml
    secrets: inherit
    needs:
      - publish-release
